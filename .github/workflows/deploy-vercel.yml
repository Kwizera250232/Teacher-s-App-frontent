name: Deploy frontend (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://studentapi.umunsi.com/api

      - name: Deploy to Vercel (CLI)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'

      - name: Vercel via Git integration
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "::notice::VERCEL_TOKEN not set — if Vercel is linked to this repo, production deploys on push to main automatically."
          echo "Check https://vercel.com/dashboard for deployment status."
