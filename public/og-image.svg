<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="rgba(255,255,255,0.05)" />
  <circle cx="150" cy="550" r="160" fill="rgba(255,255,255,0.05)" />
  <circle cx="1100" cy="500" r="120" fill="rgba(255,255,255,0.04)" />

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" ry="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />

  <!-- Graduation cap emoji area -->
  <text x="600" y="240" text-anchor="middle" font-size="110" font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif">🎓</text>

  <!-- App name -->
  <text x="600" y="340" text-anchor="middle"
    font-family="'Segoe UI', Helvetica Neue, Arial, sans-serif"
    font-size="96" font-weight="800" fill="#ffffff"
    letter-spacing="-2">UClass</text>

  <!-- Divider line -->
  <rect x="480" y="362" width="240" height="3" rx="2" fill="rgba(255,255,255,0.4)" />

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle"
    font-family="'Segoe UI', Helvetica Neue, Arial, sans-serif"
    font-size="32" font-weight="400" fill="rgba(255,255,255,0.88)"
    letter-spacing="0.5">Urubuga rw'Inyigisho</text>

  <!-- Sub tagline -->
  <text x="600" y="468" text-anchor="middle"
    font-family="'Segoe UI', Helvetica Neue, Arial, sans-serif"
    font-size="24" font-weight="300" fill="rgba(255,255,255,0.65)">Connect students &amp; teachers · Notes · Homework · Quizzes</text>

  <!-- Bottom URL badge -->
  <rect x="470" y="498" width="260" height="40" rx="20" fill="rgba(255,255,255,0.15)" />
  <text x="600" y="523" text-anchor="middle"
    font-family="'Segoe UI', Helvetica Neue, Arial, sans-serif"
    font-size="20" font-weight="600" fill="rgba(255,255,255,0.9)">student.umunsi.com</text>
</svg>
