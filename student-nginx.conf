server {
    listen 80;
    server_name student.umunsi.com www.student.umunsi.com;
    root /home/umunsi/htdocs/student.umunsi.com;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:3005/uploads/;
        proxy_set_header Host $host;
    }
    location /download/ {
        proxy_pass http://127.0.0.1:3005/download/;
        proxy_set_header Host $host;
    }
    location /share/ {
        proxy_pass http://127.0.0.1:3005/share/;
        proxy_set_header Host $host;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
